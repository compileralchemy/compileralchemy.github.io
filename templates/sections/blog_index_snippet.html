<div class="section" id="blog-section" style="background-color: #f5fdf8;">
    <div class="container">
        <div class="notification" style="background-color: #f5fdf8;">
            <div class="notification has-text-centered" style="background-color: #f5fdf8;">
                <br>
                <p class="has-text-centered">
                    <span class="title has-background-white-ter  has-text-centered" style="width: 50px; height:50px; padding: 20px; border-radius: 50%;">
                        <i class="em em-pencil2" aria-role="presentation" aria-label="PENCIL"></i>
                    </span>
                </p><br>
                <p class="title"><a href="#blog" class="no-link-dec">Blog Posts</a></p>
                <p class="subtitle">Personal Diary & Reflections</p>
            </div>
        </div>
        <div class="writings notification" style="background-color: #f5fdf8;">
            {% for post in blog_posts %}
                <span class="url p-0">{{ str(post.num).zfill(2) }}. <a href="{{ post.url }}">{{ post.title }}</a></span>
            {% endfor %}
            <br>
            <a href="{{ path }}blog" class="button is-success" style="color: white; text-decoration: none;">Read more posts</a>
        </div>
    </div>
</div>
