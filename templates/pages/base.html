<!DOCTYPE html>
<html lang="en">

<head>
    {% include 'sections/head.html' %}
    {%block head%}{%endblock%}
</head>

<body class="">

    <nav class="navbar is-white" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="{{ path }}">
                    <img src="{{ path }}assets/COMP_ALC.png" alt="Compiler Alchemy" style="height: 40px;">
                </a>
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>
            <div id="navMenu" class="navbar-menu">
                <div class="navbar-end">
                    <a class="navbar-item" href="{{ path }}blog/">Blog</a>
                    <a class="navbar-item" href="{{ path }}articles/">Articles</a>
                    <a class="navbar-item" href="{{ path }}books/sqlite-internals/">Book</a>
                    <a class="navbar-item" href="{{ path }}talks/">Talks</a>
                    <a class="navbar-item" href="{{ path }}journey/">Journey</a>
                </div>
            </div>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const burger = document.querySelector('.navbar-burger');
            const menu = document.querySelector('#navMenu');
            if (burger && menu) {
                burger.addEventListener('click', () => {
                    burger.classList.toggle('is-active');
                    menu.classList.toggle('is-active');
                });
            }
        });
    </script>

    {%block body%}{%endblock%}
</body>

</html>
