<!DOCTYPE html>
<html lang="en">
<head>
    {% include "sections/head.html" %}
    <style>
        .book__content { 
            font-size: 1.25rem; 
            max-width: var(--reading-width);
            margin: 0 auto;
        }
        .book__content p { 
            margin-bottom: 2.2rem; 
            text-align: justify;
            hyphens: auto;
        }
        /* Blog-Specific Animated Underlines */
        .book__content a {
            color: inherit;
            text-decoration: none;
            position: relative;
            box-shadow: inset 0 -2px 0 var(--primary-color);
            transition: all 0.2s ease;
        }
        .book__content a:hover {
            box-shadow: inset 0 -25px 0 var(--primary-color);
        }

        /* Blog-Specific Scroll Reveal */
        .reveal-item {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-visible {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .premium-article-container {
            max-width: var(--reading-width);
            margin: 0 auto;
            padding: 8rem 1.5rem 6rem;
        }
        #toc-wrapper {
            position: fixed;
            left: calc(50% + (var(--reading-width) / 2) + 60px);
            top: 12rem; width: 220px; display: none;
        }
        @media screen and (min-width: 1300px) { #toc-wrapper { display: block; } }
        #progress-bar {
            position: fixed;
            top: 0; left: 0; height: 3px;
            background: var(--primary-color);
            width: 0%; z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="progress-bar"></div>
    {% include 'sections/gdpr.html' %}

    <nav id="toc-wrapper">
        <div style="font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; color: #999; margin-bottom: 1rem;">Table of Contents</div>
        <ul class="toc-list" id="dynamic-toc"></ul>
    </nav>

    <article class="premium-article-container">
        <header class="article-header" style="margin-bottom: 5rem;">
            <h1 class="book__title" style="font-size: 3.5rem; margin-bottom: 1rem;">{{ title }}</h1>
            <div class="author-meta">
                <span>Abdur-Rahmaan Janhangeer</span>
                <span style="margin: 0 12px; color: #eee;">|</span>
                <span id="reading-time">...</span>
            </div>
        </header>

        <div class="book__content">
            {{ content | safe }}
        </div>
    </article>

    <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            hljs.highlightAll();
            const contentEl = document.querySelector('.book__content');
            
            // Reading Time
            const text = contentEl.innerText;
            const time = Math.ceil(text.trim().split(/\s+/).length / 225);
            document.getElementById('reading-time').innerText = `${time} min read`;

            // Progress Bar
            window.addEventListener('scroll', () => {
                const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
                const pb = document.getElementById("progress-bar");
                if(pb) pb.style.width = scrolled + "%";
            });

            // Intersection Observer for Reveal - Specific to Blog
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal-visible');
                    }
                });
            }, { threshold: 0.1 });

            const targets = contentEl.querySelectorAll('p, h2, h3, pre, ul, ol, blockquote');
            targets.forEach(el => {
                el.classList.add('reveal-item');
                revealObserver.observe(el);
            });

            // TOC Generation
            const toc = document.getElementById('dynamic-toc');
            const headings = contentEl.querySelectorAll('h2');
            headings.forEach((h, i) => {
                const id = `section-${i}`;
                h.id = id;
                const li = document.createElement('li');
                li.className = 'toc-item';
                li.style.listStyle = "none";
                li.style.marginBottom = "0.75rem";
                li.innerHTML = `<a href="#${id}" class="toc-link" style="font-size: 0.9rem; color: #666; text-decoration: none; box-shadow: none;">${h.innerText}</a>`;
                toc.appendChild(li);
            });

            // Active TOC Highlighting
            const activeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.toc-link').forEach(l => {
                            l.style.color = '#666';
                            l.style.fontWeight = '400';
                        });
                        const link = document.querySelector(`.toc-link[href="#${entry.target.id}"]`);
                        if (link) {
                            link.style.color = '#000';
                            link.style.fontWeight = '700';
                        }
                    }
                });
            }, { rootMargin: "-20% 0px -70% 0px" });
            headings.forEach(h => activeObserver.observe(h));
        });
    </script>

    {% include 'sections/footer.html' %}
</body>
</html>
